<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime.js Http Request/Response Animation</title>
    <script src="/node_modules/animejs/dist/bundles/anime.umd.min.js"></script>
    <link rel="stylesheet" href="rate-limiter.css" />
  </head>
  <body>
    <div class="container">
      <div id="req-label" class="label">Client</div>
      <div id="res-label" class="label">Gateway</div>

      <svg viewBox="0 0 600 200">
        <path
          id="requestPath"
          d="M 100 80 L 500 80"
          stroke="#4a90e2"
          stroke-width="2"
          fill="none"
          stroke-dasharray="10"
        />

        <path
          id="responsePath"
          d="M 500 120 L 100 120"
          stroke="#f5a623"
          stroke-width="2"
          fill="none"
          stroke-dasharray="10"
        />

        <!-- <circle id="requestDot" r="4" fill="#4a90e2" />
        <circle id="responseDot" r="4" fill="#f5a623" /> -->

    </div>

      console.log("svg", svg);
      //   console.log("createMotionPath", createMotionPath);

      const path = svg.createMotionPath("#requestPath");
      console.log("path", path);
      const translateX = path.translateX(0);
      console.log("translateX", translateX);

      console.log("svg.createDrawable", svg.createDrawable);

      const tl = createTimeline({

      // Optional: Animate the dashed lines to look like flowing traffic
      animate(svg.createDrawable('#requestPath'), {
