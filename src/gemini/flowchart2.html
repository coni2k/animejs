<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Ecosystem Levy - Animated Flowchart</title>
    <script src="/node_modules/animejs/dist/bundles/anime.umd.min.js"></script>
    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .diagram-container {
        position: relative;
        width: 800px;
        height: 720px;
      }

      /* SVG Styling for the connection lines */
      svg.connections {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      .route-line {
        fill: none;
        stroke: #334155;
        stroke-width: 3;
        stroke-dasharray: 6 6;
        opacity: 0; /* Hidden initially */
      }

      /* The traveling data packets */
      .packet {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #60a5fa;
        border-radius: 50%;
        top: -5px; /* Offset to center on the path */
        left: -5px;
        z-index: 2;
        box-shadow: 0 0 10px 3px rgba(96, 165, 250, 0.6);
        opacity: 0; /* Hidden initially */
      }

      /* Specific colors for different types of flow */
      .packet.fund {
        background-color: #10b981;
        box-shadow: 0 0 10px 3px rgba(16, 185, 129, 0.6);
      }
      .packet.policy {
        background-color: #c084fc;
        box-shadow: 0 0 10px 3px rgba(192, 132, 252, 0.6);
      }

      /* Node Styling */
      .node {
        position: absolute;
        background: #1e293b;
        border: 2px solid #3b82f6;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        box-sizing: border-box;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        z-index: 3;
        opacity: 0;
      }

      .title {
        font-size: 1.1em;
        font-weight: bold;
        color: #93c5fd;
        margin-bottom: 6px;
      }
      .desc {
        font-size: 0.8em;
        color: #cbd5e1;
        line-height: 1.3;
      }

      /* Hardcoded Node Positions (Width: 200px, Height: ~85px) */
      #node-platforms {
        left: 100px;
        top: 60px;
        width: 200px;
      }
      #node-users {
        left: 500px;
        top: 60px;
        width: 200px;
      }
      #node-lcs {
        left: 100px;
        top: 260px;
        width: 200px;
      }
      #node-eifm {
        left: 500px;
        top: 260px;
        width: 200px;
      }
      #node-policy {
        left: 100px;
        top: 460px;
        width: 200px;
      }
      #node-dds {
        left: 500px;
        top: 460px;
        width: 200px;
      }

      #node-contributors {
        left: 200px;
        top: 620px;
        width: 400px;
        border-color: #10b981;
      }
      #node-contributors .title {
        color: #6ee7b7;
      }
    </style>
  </head>
  <body>
    <div class="diagram-container">
      <svg class="connections">
        <path id="path-plat-lcs" class="route-line" d="M 200 100 L 200 300" />
        <path
          id="path-users-lcs"
          class="route-line"
          d="M 600 100 C 600 200, 200 200, 200 300"
        />
        <path id="path-lcs-eifm" class="route-line" d="M 200 300 L 600 300" />
        <path
          id="path-eifm-policy"
          class="route-line"
          d="M 600 300 C 600 400, 200 400, 200 500"
        />
        <path id="path-eifm-dds" class="route-line" d="M 600 300 L 600 500" />
        <path
          id="path-dds-contrib"
          class="route-line"
          d="M 600 500 C 600 580, 400 580, 400 660"
        />
        <path
          id="path-policy-contrib"
          class="route-line"
          d="M 200 500 C 200 580, 400 580, 400 660"
        />
      </svg>

      <div
        class="packet"
        style="offset-path: path(&quot;M 200 100 L 200 300&quot;)"
      ></div>
      <div
        class="packet"
        style="
          offset-path: path(&quot;M 600 100 C 600 200, 200 200, 200 300&quot;);
        "
      ></div>

      <div
        class="packet fund"
        style="offset-path: path(&quot;M 200 300 L 600 300&quot;)"
      ></div>

      <div
        class="packet policy"
        style="
          offset-path: path(&quot;M 600 300 C 600 400, 200 400, 200 500&quot;);
        "
      ></div>
      <div
        class="packet fund"
        style="offset-path: path(&quot;M 600 300 L 600 500&quot;)"
      ></div>

      <div
        class="packet fund"
        style="
          offset-path: path(&quot;M 600 500 C 600 580, 400 580, 400 660&quot;);
        "
      ></div>
      <div
        class="packet policy"
        style="
          offset-path: path(&quot;M 200 500 C 200 580, 400 580, 400 660&quot;);
        "
      ></div>

      <div id="node-platforms" class="node">
        <div class="title">AI Platforms</div>
        <div class="desc">Report Consumption</div>
      </div>
      <div id="node-users" class="node">
        <div class="title">AI Users</div>
        <div class="desc">Subscriptions & Tokens</div>
      </div>

      <div id="node-lcs" class="node">
        <div class="title">Levy Collection</div>
        <div class="desc">Calculates tax (LCS)</div>
      </div>
      <div id="node-eifm" class="node">
        <div class="title">EU Info Fund</div>
        <div class="desc">Manages Treasury (EIFM)</div>
      </div>

      <div id="node-policy" class="node">
        <div class="title">Policy Board</div>
        <div class="desc">Governance Rules</div>
      </div>
      <div id="node-dds" class="node">
        <div class="title">Data-Driven Dist.</div>
        <div class="desc">Calculates Attribution (DDS)</div>
      </div>

      <div id="node-contributors" class="node">
        <div class="title">Ecosystem Contributors</div>
        <div class="desc">Creative Industries, Journalism, Open-Source</div>
      </div>
    </div>

    <script>
      const { animate, stagger } = anime;

      // 1. Build in the nodes from top to bottom
      animate(".node", {
        translateY: [-30, 0],
        opacity: [0, 1],
        duration: 800,
        delay: stagger(150),
        ease: "outBack(1.2)",
      });

      // 2. Fade in the dashed SVG connecting lines
      animate(".route-line", {
        opacity: [0, 0.4],
        duration: 1000,
        delay: stagger(100, { start: 800 }),
        ease: "linear",
      });

      // 3. Animate the data packets moving along their offset-paths
      // We fade them in, move them 100% of the distance, and loop it
      animate(".packet", {
        offsetDistance: ["0%", "100%"],
        opacity: [
          { value: 0, duration: 0 },
          { value: 1, duration: 300 },
          { value: 1, duration: 2400 }, // Stay visible for most of the trip
          { value: 0, duration: 300 }, // Fade out right at the end
        ],
        duration: 3000,
        ease: "linear",
        loop: true,
        delay: stagger(400, { start: 1500 }), // Start after lines are drawn
      });

      // 4. Pulse the final contributor box
      setTimeout(() => {
        animate("#node-contributors", {
          scale: [1, 1.02, 1],
          boxShadow: [
            "0 4px 15px rgba(0,0,0,0.3)",
            "0 4px 30px rgba(16, 185, 129, 0.4)",
            "0 4px 15px rgba(0,0,0,0.3)",
          ],
          duration: 3000,
          loop: true,
          ease: "inOutSine",
        });
      }, 2500);
    </script>
  </body>
</html>
